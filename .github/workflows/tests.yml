name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # pytest-homeassistant-custom-component requires 3.14+.
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements-test.txt
          pip install pytest-cov ruff

      - name: Lint
        run: |
          ruff check custom_components tests
          ruff format --check custom_components tests

      - name: Tests
        run: pytest --cov=custom_components/rainbird_advanced --cov-report=term-missing
