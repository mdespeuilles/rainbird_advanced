# Onglet "Arrosage" pour Home Assistant (français), format "sections"
# (le format moderne des tableaux de bord HA), pensé pour Rain Bird Advanced.
#
# ⚠️ Le préfixe des entités
# Les entités commencent par "rain_bird_controller_" (le nom de votre appareil).
# Si un identifiant ne correspond pas chez vous, corrigez-le. Pour connaître vos
# identifiants exacts : Outils de développement → Modèle (Template), collez :
#
#   {{ states | selectattr('entity_id','search','rain_bird')
#      | map(attribute='entity_id') | list }}
#
# Pour l'utiliser : Tableau de bord → ⋮ → Modifier → bouton "+ Ajouter une vue"
# → icône crayon de la vue → "Modifier en YAML", puis collez ce bloc entier.

type: sections
title: Arrosage
path: arrosage
icon: mdi:sprinkler-variant
sections:
  - type: grid
    cards:
      - type: heading
        heading: État
      - type: conditional
        conditions:
          - entity: sensor.rain_bird_controller_mode_du_controleur
            state: watering
        card:
          type: markdown
          content: >
            ## 💧 Arrosage en cours

            Zone **{{ states('sensor.rain_bird_controller_zone_active') }}** ·
            {{ states('sensor.rain_bird_controller_programme_actif') }}
      - type: glance
        columns: 3
        entities:
          - entity: sensor.rain_bird_controller_mode_du_controleur
            name: Mode
          - entity: sensor.rain_bird_controller_zone_active
            name: Zone active
          - entity: binary_sensor.rain_bird_controller_capteur_de_pluie
            name: Pluie

  - type: grid
    cards:
      - type: heading
        heading: Zones
      # Pas de "name:" ici : chaque interrupteur affiche le nom que vous lui
      # avez donné dans Home Assistant (le boîtier ne stocke aucun nom de zone,
      # donc ces noms vivent uniquement dans HA).
      - type: entities
        state_color: true
        entities:
          - entity: switch.rain_bird_controller_zone_1
          - entity: switch.rain_bird_controller_zone_2
          - entity: switch.rain_bird_controller_zone_3
          - entity: switch.rain_bird_controller_zone_4
          - entity: switch.rain_bird_controller_zone_5
          - entity: switch.rain_bird_controller_zone_6
          - type: divider
          - entity: button.rain_bird_controller_arreter_l_arrosage
            name: Tout arrêter
          - entity: button.rain_bird_controller_zone_suivante
            name: Zone suivante

  - type: grid
    cards:
      - type: heading
        heading: Réglages
      - type: entities
        entities:
          - entity: number.rain_bird_controller_zone_1_duree_d_arrosage
            name: Durée zone 1
          - entity: number.rain_bird_controller_zone_2_duree_d_arrosage
            name: Durée zone 2
          - entity: number.rain_bird_controller_zone_3_duree_d_arrosage
            name: Durée zone 3
          - entity: number.rain_bird_controller_zone_4_duree_d_arrosage
            name: Durée zone 4
          - entity: number.rain_bird_controller_zone_5_duree_d_arrosage
            name: Durée zone 5
          - entity: number.rain_bird_controller_zone_6_duree_d_arrosage
            name: Durée zone 6
          - type: divider
          - entity: number.rain_bird_controller_report_pour_pluie
            name: Report pour pluie (jours)

  - type: grid
    cards:
      - type: heading
        heading: Programmes
      - type: entities
        entities:
          - entity: button.rain_bird_controller_lancer_le_programme_a
            name: Lancer le programme A
          - entity: button.rain_bird_controller_lancer_le_programme_b
            name: Lancer le programme B
          - entity: button.rain_bird_controller_lancer_le_programme_c
            name: Lancer le programme C
      # Le bloc "content" utilise "|" (littéral) pour préserver les sauts de
      # ligne : indispensable pour que le markdown affiche titres et listes.
      # Les programmes sans zones (non utilisés) sont masqués.
      - type: markdown
        content: |
          {% set progs = [
            ['sensor.rain_bird_controller_programme_a', 'A'],
            ['sensor.rain_bird_controller_programme_b', 'B'],
            ['sensor.rain_bird_controller_programme_c', 'C'] ] %}
          {% for eid, lettre in progs -%}
          {% set zones = state_attr(eid, 'zones') %}
          {% if zones %}
          ### Programme {{ lettre }}

          Prochain départ : **{{ as_timestamp(states(eid)) | timestamp_custom('%A %d %B à %H:%M', true) if states(eid) not in ['unknown','unavailable'] else '—' }}**

          Fréquence : {{ state_attr(eid, 'frequency') }} · Total : {{ state_attr(eid, 'total_duration_minutes') }} min

          {% for z in zones -%}
          - Zone {{ z.zone }} — {{ z.duration_minutes }} min
          {% endfor %}
          {% endif -%}
          {% endfor %}

  - type: grid
    cards:
      - type: heading
        heading: Dernier arrosage
      - type: entities
        entities:
          - entity: sensor.rain_bird_controller_zone_1_dernier_arrosage
            name: Zone 1
          - entity: sensor.rain_bird_controller_zone_2_dernier_arrosage
            name: Zone 2
          - entity: sensor.rain_bird_controller_zone_3_dernier_arrosage
            name: Zone 3
          - entity: sensor.rain_bird_controller_zone_4_dernier_arrosage
            name: Zone 4
          - entity: sensor.rain_bird_controller_zone_5_dernier_arrosage
            name: Zone 5
          - entity: sensor.rain_bird_controller_zone_6_dernier_arrosage
            name: Zone 6

  - type: grid
    cards:
      - type: heading
        heading: Planning
      - type: calendar
        initial_view: listWeek
        entities:
          - calendar.rain_bird_controller_planning_d_arrosage
